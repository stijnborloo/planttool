<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hipster Kaartjes — Speler</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#16151C;--paper:#F5EFE3;--mustard:#E8B33C;--raspberry:#D8456B;--teal:#2E8C83;--line:#3A3945}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--ink);color:var(--paper);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
h1{font-family:'Archivo Black',sans-serif;font-size:clamp(24px,7vw,36px);letter-spacing:-0.02em;margin-bottom:6px}
h1 .accent{color:var(--mustard)}
.sub{color:#9A97A6;font-size:14px;margin-bottom:28px}
.disc{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at center,var(--mustard) 0 14px,#0d0d12 15px 100%);border:3px solid #26252F;margin:0 auto 24px;animation:spin 4s linear infinite;position:relative}
.disc::after{content:'';position:absolute;inset:22px;border-radius:50%;border:1px solid #2c2b36}
@keyframes spin{to{transform:rotate(360deg)}}
.playerwrap{width:min(420px,100%);border-radius:14px;overflow:hidden;position:relative;margin-bottom:16px}
.playerwrap iframe{display:block;width:100%;height:152px;border:0;filter:blur(14px) saturate(.7);transition:filter .4s ease}
.playerwrap.revealed iframe{filter:none}
.playerwrap .veil{position:absolute;inset:0;pointer-events:none;display:flex;align-items:flex-end;justify-content:center;padding:8px;font-size:12px;color:var(--paper);text-shadow:0 1px 4px #000}
.playerwrap.revealed .veil{display:none}
.btn{font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;border:none;border-radius:10px;padding:14px 22px;cursor:pointer;background:var(--raspberry);color:var(--paper);margin-top:6px}
.btn.big{background:#1DB954;color:#0d0d0d;font-size:17px;text-decoration:none;display:inline-block}
.hint{font-size:12px;color:#807D8E;margin-top:14px;line-height:1.6;max-width:420px}
.answer{display:none;margin-top:18px}
.answer.show{display:block}
.err{color:var(--raspberry);font-size:14px}
</style>
</head>
<body>
<h1>HIPSTER<span class="accent">KAARTJES</span></h1>
<p class="sub">Niet spieken — eerst raden!</p>
<div class="disc" id="disc"></div>
<div id="content"></div>

<script>
(function(){
const params = new URLSearchParams(location.search);
const t = params.get('t');
const q = params.get('q');
const content = document.getElementById('content');

if(t && /^[A-Za-z0-9]{15,}$/.test(t)){
  /* Directe track: geblurde Spotify-embed */
  const wrap=document.createElement('div');
  wrap.className='playerwrap';
  wrap.innerHTML='<iframe src="https://open.spotify.com/embed/track/'+t+'?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>'+
    '<div class="veil">▶ Druk links op de (wazige) play-knop</div>';
  content.appendChild(wrap);
  const btn=document.createElement('button');
  btn.className='btn';
  btn.textContent='Toon antwoord';
  btn.addEventListener('click',()=>{ wrap.classList.add('revealed'); btn.style.display='none'; });
  content.appendChild(btn);
  const hint=document.createElement('p');
  hint.className='hint';
  hint.textContent='Speelt maar een stukje af? Log dan één keer in bij Spotify in deze browser voor volledige nummers.';
  content.appendChild(hint);
}else if(q){
  /* Zoek-variant: antwoord verborgen tot de knop */
  let query='';
  try{ query=decodeURIComponent(escape(atob(q.replace(/-/g,'+').replace(/_/g,'/')))); }catch(e){}
  if(query){
    const p=document.createElement('p');
    p.className='hint';
    p.style.marginBottom='10px';
    p.textContent='Deze kaart opent Spotify via een zoekopdracht. Enkel de DJ mag kijken!';
    content.appendChild(p);
    const a=document.createElement('a');
    a.className='btn big';
    a.textContent='▶ Open in Spotify (enkel DJ)';
    a.href='https://open.spotify.com/search/'+encodeURIComponent(query);
    content.appendChild(a);
  }else{
    content.innerHTML='<p class="err">Ongeldige kaart.</p>';
  }
}else{
  content.innerHTML='<p class="err">Geen nummer gevonden op deze kaart.</p>';
}
})();
</script>
</body>
</html>
