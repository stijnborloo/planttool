<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantScope — Botanische AI</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary:       #1a4d2e;
            --primary-light: #2d7a4a;
            --accent:        #d4a574;
            --accent-light:  #e8c4a0;
            --danger:        #c0392b;
            --danger-bg:     #fdf0ee;
            --danger-border: #f0b8b0;
            --warn:          #e67e22;
            --warn-bg:       #fef9f0;
            --warn-border:   #f5d6a0;
            --bg-light:      #f8f7f5;
            --text-dark:     #1a1a1a;
            --text-light:    #7a7a7a;
            --border:        #e0d5cc;
            --card-bg:       rgba(255,255,255,0.75);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, #f0ebe5 100%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(circle at 15% 50%, rgba(45,122,74,0.06) 0%, transparent 50%),
                radial-gradient(circle at 85% 20%, rgba(212,165,116,0.06) 0%, transparent 50%);
            pointer-events: none; z-index: -1;
        }

        /* ── HEADER ── */
        header {
            position: fixed; top: 0; width: 100%;
            background: rgba(248,247,245,0.96);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
            animation: slideDown 0.6s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .header-content {
            max-width: 1100px; margin: 0 auto;
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem; font-weight: 700;
            color: var(--primary);
            display: flex; align-items: center; gap: 0.6rem;
            letter-spacing: -1px; text-decoration: none;
        }
        .logo-icon { font-size: 1.9rem; }
        .nav-btn {
            background: none; border: none;
            font-family: 'Lato', sans-serif;
            font-size: 0.95rem; font-weight: 500;
            color: var(--text-dark); cursor: pointer;
            position: relative; padding: 0.2rem 0;
            transition: color 0.3s;
        }
        .nav-btn::after {
            content: ''; position: absolute; bottom: -3px; left: 0;
            width: 0; height: 2px; background: var(--accent);
            transition: width 0.3s;
        }
        .nav-btn:hover::after { width: 100%; }
        .history-badge {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--accent); color: white;
            font-size: 0.7rem; font-weight: 700;
            width: 18px; height: 18px; border-radius: 50%;
            margin-left: 5px; vertical-align: middle;
        }

        /* ── MAIN ── */
        main { max-width: 1100px; margin: 0 auto; padding: 7rem 2rem 5rem; }

        /* ── HERO ── */
        .hero {
            text-align: center; margin-bottom: 3.5rem;
            animation: fadeUp 0.8s ease-out 0.15s backwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 7vw, 3.8rem);
            font-weight: 700; color: var(--primary);
            margin-bottom: 0.8rem; letter-spacing: -2px; line-height: 1.15;
        }
        .hero p {
            font-size: 1.1rem; color: var(--text-light);
            max-width: 560px; margin: 0 auto;
            font-weight: 300; letter-spacing: 0.4px;
        }

        /* ── UPLOAD CARD ── */
        .upload-container {
            max-width: 680px; margin: 0 auto 3rem;
            animation: fadeUp 0.8s ease-out 0.3s backwards;
        }
        .upload-area {
            border: 2px dashed var(--primary);
            border-radius: 20px; padding: 3.5rem 2rem;
            text-align: center; cursor: pointer;
            transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
            background: linear-gradient(135deg,rgba(45,122,74,.02),rgba(212,165,116,.02));
            position: relative; overflow: hidden;
        }
        .upload-area::after {
            content: ''; position: absolute;
            inset: 0; border-radius: 18px;
            background: radial-gradient(circle at 60% 40%, rgba(212,165,116,.12), transparent 65%);
            opacity: 0; transition: opacity 0.4s;
        }
        .upload-area:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 18px 40px rgba(26,77,46,.1); }
        .upload-area:hover::after { opacity: 1; }
        .upload-icon { font-size: 3.2rem; margin-bottom: 0.8rem; animation: float 3.2s ease-in-out infinite; display: block; }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }
        .upload-area h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.45rem; color: var(--primary); margin-bottom: 0.4rem;
        }
        .upload-area p { color: var(--text-light); font-size: 0.95rem; }

        /* Mobile camera buttons */
        .mobile-actions {
            display: flex; gap: 0.75rem; margin-top: 1.5rem;
            justify-content: center; flex-wrap: wrap;
        }
        .btn-camera {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.4rem; border-radius: 50px;
            border: 2px solid var(--primary-light);
            background: white; color: var(--primary);
            font-family: 'Lato', sans-serif; font-size: 0.95rem;
            font-weight: 500; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-camera:hover { background: rgba(45,122,74,.06); transform: translateY(-1px); }
        .btn-camera .cam-icon { font-size: 1.1rem; }

        input[type="file"] { display: none; }

        /* ── PREVIEW ── */
        .preview-wrap {
            margin: 1.5rem 0;
            display: none; animation: fadeUp 0.5s ease-out;
        }
        .preview-wrap.active { display: block; }
        .preview-image {
            width: 100%; max-height: 460px; object-fit: cover;
            border-radius: 14px;
            box-shadow: 0 24px 50px rgba(26,77,46,.14);
            margin-bottom: 0.6rem;
        }
        .compress-info {
            text-align: center; font-size: 0.82rem;
            color: var(--text-light); margin-bottom: 0.5rem;
        }
        .compress-info span { color: var(--primary-light); font-weight: 600; }

        /* ── BUTTONS ── */
        .button-group {
            display: none; gap: 0.8rem;
            justify-content: center; flex-wrap: wrap; margin: 1.2rem 0;
        }
        .button-group.active { display: flex; }
        button {
            padding: 0.85rem 1.8rem; border: none; border-radius: 12px;
            font-family: 'Lato', sans-serif; font-size: 0.98rem;
            font-weight: 500; cursor: pointer;
            transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
            letter-spacing: 0.3px;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 8px 24px rgba(26,77,46,.22); }
        .btn-primary:hover:not(:disabled) { background: var(--primary-light); transform: translateY(-3px); box-shadow: 0 14px 36px rgba(26,77,46,.3); }
        .btn-secondary { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-secondary:hover:not(:disabled) { background: rgba(26,77,46,.05); transform: translateY(-2px); }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        .spinner { display: inline-block; width: 15px; height: 15px; border: 2.5px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: white; animation: spin .75s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ERROR ── */
        .error-box {
            background: var(--danger-bg); border: 1px solid var(--danger-border);
            border-radius: 10px; padding: 1rem 1.2rem;
            color: var(--danger); margin: 1rem 0; display: none;
            animation: fadeUp 0.4s ease-out;
        }
        .error-box.active { display: block; }

        /* ── RESULTS ── */
        .results-container { display: none; animation: fadeUp 0.7s ease-out; }
        .results-container.active { display: block; }

        .result-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 2.2rem 2.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(26,77,46,.07);
            animation: fadeUp 0.6s ease-out backwards;
        }
        .result-card:nth-child(1) { animation-delay: 0s; }
        .result-card:nth-child(2) { animation-delay: 0.1s; }
        .result-card:nth-child(3) { animation-delay: 0.2s; }

        .result-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem; color: var(--primary);
            margin-bottom: 1.4rem; display: flex; align-items: center; gap: 0.7rem;
        }
        .result-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem; color: var(--primary-light);
            margin: 1.4rem 0 0.5rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .result-item {
            padding-bottom: 1.2rem; margin-bottom: 1.2rem;
            border-bottom: 1px solid rgba(212,165,116,.18);
        }
        .result-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        .result-label { font-weight: 600; color: var(--primary); display: block; margin-bottom: 0.25rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.6px; }
        .result-value { color: var(--text-dark); line-height: 1.75; font-weight: 300; font-size: 1rem; }
        em { font-style: italic; color: var(--text-light); }

        /* Confidence bar */
        .confidence-wrap { margin-top: 0.4rem; }
        .confidence-bar-bg { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; }
        .confidence-bar-fill {
            height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, var(--primary-light), var(--accent));
            transition: width 1.2s cubic-bezier(.22,.61,.36,1);
        }
        .confidence-pct { font-size: 0.85rem; color: var(--text-light); margin-top: 0.3rem; }

        /* ── GIFTIG BADGE ── */
        .giftig-banner {
            background: var(--danger-bg);
            border: 1.5px solid var(--danger-border);
            border-radius: 12px; padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: flex-start;
        }
        .giftig-banner .skull { font-size: 2rem; flex-shrink: 0; }
        .giftig-banner h4 { color: var(--danger); font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; }
        .giftig-banner p { color: #7a2520; font-size: 0.93rem; line-height: 1.55; }
        .giftig-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .pill {
            display: inline-block; border-radius: 99px;
            padding: 0.2rem 0.75rem; font-size: 0.78rem; font-weight: 600;
        }
        .pill-danger { background: var(--danger); color: white; }
        .pill-warn   { background: var(--warn); color: white; }
        .pill-safe   { background: var(--primary-light); color: white; }

        /* Weed box */
        .weed-banner {
            background: var(--warn-bg); border-left: 4px solid var(--warn);
            border-radius: 10px; padding: 1rem 1.3rem; margin-bottom: 1.3rem;
        }
        .weed-banner strong { color: var(--warn); }

        /* ── HISTORY PANEL ── */
        .history-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
            z-index: 300; opacity: 0; pointer-events: none;
            transition: opacity 0.35s;
        }
        .history-overlay.open { opacity: 1; pointer-events: all; }

        .history-drawer {
            position: fixed; top: 0; right: -420px;
            width: min(420px, 100vw); height: 100%;
            background: var(--bg-light);
            box-shadow: -20px 0 60px rgba(26,77,46,.15);
            z-index: 301; overflow-y: auto;
            transition: right 0.4s cubic-bezier(.34,1.1,.64,1);
            display: flex; flex-direction: column;
        }
        .history-drawer.open { right: 0; }
        .history-header {
            padding: 1.5rem 1.8rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--bg-light); z-index: 1;
        }
        .history-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem; color: var(--primary);
        }
        .close-btn {
            background: none; border: none; font-size: 1.5rem;
            cursor: pointer; color: var(--text-light);
            padding: 0.2rem; transition: color 0.3s;
        }
        .close-btn:hover { color: var(--danger); }
        .history-list { padding: 1rem 1.2rem; flex: 1; }
        .history-empty {
            text-align: center; color: var(--text-light);
            padding: 3rem 1rem; font-size: 0.95rem;
        }
        .history-item {
            display: flex; gap: 0.9rem; align-items: center;
            padding: 0.9rem; border-radius: 12px;
            border: 1px solid var(--border); margin-bottom: 0.75rem;
            cursor: pointer; transition: all 0.25s; background: white;
        }
        .history-item:hover { border-color: var(--primary-light); box-shadow: 0 4px 14px rgba(26,77,46,.1); transform: translateX(-3px); }
        .history-thumb {
            width: 56px; height: 56px; border-radius: 8px;
            object-fit: cover; flex-shrink: 0;
            border: 1px solid var(--border);
        }
        .history-info { flex: 1; min-width: 0; }
        .history-name { font-weight: 600; font-size: 0.95rem; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-type { font-size: 0.8rem; color: var(--text-light); }
        .history-date { font-size: 0.75rem; color: var(--text-light); }
        .type-badge {
            display: inline-block; border-radius: 99px;
            padding: 0.15rem 0.6rem; font-size: 0.75rem; font-weight: 600;
            margin-top: 0.2rem;
        }
        .badge-onkruid   { background: rgba(230,126,34,.15); color: var(--warn); }
        .badge-tuinplant { background: rgba(45,122,74,.12); color: var(--primary); }
        .badge-kamer     { background: rgba(39,174,96,.12); color: #1e8449; }
        .badge-moes      { background: rgba(212,165,116,.2); color: #8a5a2a; }
        .history-del {
            background: none; border: none; cursor: pointer;
            font-size: 1rem; color: #ccc; padding: 0.2rem;
            transition: color 0.2s; flex-shrink: 0;
        }
        .history-del:hover { color: var(--danger); }
        .clear-history-btn {
            display: block; width: calc(100% - 2.4rem);
            margin: 0 1.2rem 1.2rem;
            padding: 0.7rem; background: none;
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text-light); font-family: 'Lato', sans-serif;
            font-size: 0.9rem; cursor: pointer; transition: all 0.25s;
        }
        .clear-history-btn:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

        /* ── DOWNLOAD / ACTIONS ── */
        .result-actions { text-align: center; margin-top: 2rem; display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
        .btn-gold {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #3a2000; font-weight: 700;
            box-shadow: 0 8px 24px rgba(212,165,116,.3);
        }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(212,165,116,.4); }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .header-content { padding: 0.8rem 1rem; }
            main { padding: 6rem 1rem 3rem; }
            .hero h1 { font-size: 2rem; }
            .result-card { padding: 1.4rem 1.2rem; }
            .history-drawer { width: 100vw; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <div class="header-content">
        <a class="logo" href="#"><span class="logo-icon">🌿</span>PlantScope</a>
        <button class="nav-btn" id="historyBtn">
            Geschiedenis <span class="history-badge" id="historyCount" style="display:none">0</span>
        </button>
    </div>
</header>

<!-- History Drawer -->
<div class="history-overlay" id="historyOverlay"></div>
<aside class="history-drawer" id="historyDrawer">
    <div class="history-header">
        <h3>📋 Geschiedenis</h3>
        <button class="close-btn" id="historyClose" title="Sluiten">✕</button>
    </div>
    <div class="history-list" id="historyList"></div>
    <button class="clear-history-btn" id="clearHistory">Alles verwijderen</button>
</aside>

<main>
    <!-- Hero -->
    <section class="hero">
        <h1>Ontdek je Plant</h1>
        <p>Upload een foto en ontvang direct botanische analyse, verzorgingstips en veiligheidsinformatie.</p>
    </section>

    <!-- Upload -->
    <section class="upload-container">
        <div class="upload-area" id="uploadArea">
            <span class="upload-icon">📸</span>
            <h2>Upload je plantfoto</h2>
            <p>Sleep hier een afbeelding of gebruik onderstaande knoppen</p>
        </div>

        <!-- Mobile camera buttons - visible below upload area -->
        <div class="mobile-actions">
            <button class="btn-camera" id="galleryBtn">
                <span class="cam-icon">🖼️</span> Fotogalerij
            </button>
            <button class="btn-camera" id="cameraBtn">
                <span class="cam-icon">📷</span> Camera
            </button>
        </div>

        <input type="file" id="fileGallery" accept="image/*">
        <input type="file" id="fileCamera" accept="image/*" capture="environment">

        <div class="preview-wrap" id="previewWrap">
            <img id="previewImage" class="preview-image" alt="Preview">
            <p class="compress-info" id="compressInfo"></p>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="button-group" id="buttonGroup">
            <button class="btn-secondary" id="resetBtn">↻ Nieuwe foto</button>
            <button class="btn-primary" id="analyzeBtn">🔍 Analyseren</button>
        </div>
    </section>

    <!-- Results -->
    <section class="results-container" id="resultsContainer"></section>
</main>

<script>
// ─────────────────────────────────────────────
//  Config — update WORKER_URL na deployment
// ─────────────────────────────────────────────
const WORKER_URL = 'https://planttool.stijn-borloo.workers.dev/analyze';
const HISTORY_KEY = 'plantscope_history';
const MAX_HISTORY = 20;
const MAX_IMG_PX   = 1200;   // resize to max 1200px wide/tall
const IMG_QUALITY  = 0.80;   // JPEG quality after compression

// ─────────────────────────────────────────────
//  DOM refs
// ─────────────────────────────────────────────
const uploadArea    = document.getElementById('uploadArea');
const galleryBtn    = document.getElementById('galleryBtn');
const cameraBtn     = document.getElementById('cameraBtn');
const fileGallery   = document.getElementById('fileGallery');
const fileCamera    = document.getElementById('fileCamera');
const previewWrap   = document.getElementById('previewWrap');
const previewImage  = document.getElementById('previewImage');
const compressInfo  = document.getElementById('compressInfo');
const analyzeBtn    = document.getElementById('analyzeBtn');
const resetBtn      = document.getElementById('resetBtn');
const buttonGroup   = document.getElementById('buttonGroup');
const errorBox      = document.getElementById('errorBox');
const resultsEl     = document.getElementById('resultsContainer');
const historyBtn    = document.getElementById('historyBtn');
const historyClose  = document.getElementById('historyClose');
const historyOverlay= document.getElementById('historyOverlay');
const historyDrawer = document.getElementById('historyDrawer');
const historyList   = document.getElementById('historyList');
const historyCount  = document.getElementById('historyCount');
const clearHistBtn  = document.getElementById('clearHistory');

let selectedImage = null;   // compressed base64 dataURL
let currentResult = null;

// ─────────────────────────────────────────────
//  1️⃣  IMAGE COMPRESSION (Canvas API)
// ─────────────────────────────────────────────
function compressImage(file) {
    return new Promise((resolve) => {
        const origSize = file.size;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                let { width, height } = img;

                // Resize if too large
                if (width > MAX_IMG_PX || height > MAX_IMG_PX) {
                    const ratio = Math.min(MAX_IMG_PX / width, MAX_IMG_PX / height);
                    width  = Math.round(width  * ratio);
                    height = Math.round(height * ratio);
                }

                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const compressed = canvas.toDataURL('image/jpeg', IMG_QUALITY);
                const newSize = Math.round((compressed.length * 3) / 4);
                const saved   = Math.round((1 - newSize / origSize) * 100);

                resolve({
                    dataURL: compressed,
                    origKB: Math.round(origSize / 1024),
                    newKB:  Math.round(newSize  / 1024),
                    saved:  Math.max(0, saved),
                });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// ─────────────────────────────────────────────
//  File handling
// ─────────────────────────────────────────────
function showError(msg) {
    errorBox.textContent = '⚠️ ' + msg;
    errorBox.classList.add('active');
}
function clearError() { errorBox.classList.remove('active'); }

async function handleFile(file) {
    if (!file) return;
    if (!file.type.startsWith('image/')) { showError('Kies een afbeeldingsbestand (JPG, PNG, WebP).'); return; }
    if (file.size > 30 * 1024 * 1024)    { showError('Bestand is te groot (max 30 MB).'); return; }

    clearError();
    analyzeBtn.disabled = true;
    analyzeBtn.innerHTML = '<span class="spinner"></span>Comprimeren…';

    const { dataURL, origKB, newKB, saved } = await compressImage(file);

    selectedImage = dataURL;
    previewImage.src = dataURL;
    previewWrap.classList.add('active');
    buttonGroup.classList.add('active');
    resultsEl.classList.remove('active');
    resultsEl.innerHTML = '';

    compressInfo.innerHTML = saved > 5
        ? `Geoptimaliseerd: <span>${origKB} KB → ${newKB} KB</span> (${saved}% kleiner)`
        : `Klaar (${newKB} KB)`;

    analyzeBtn.disabled = false;
    analyzeBtn.innerHTML = '🔍 Analyseren';
}

// Upload area drag-drop
uploadArea.addEventListener('click', () => fileGallery.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--accent)'; });
uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'var(--primary)'; });
uploadArea.addEventListener('drop', e => {
    e.preventDefault(); uploadArea.style.borderColor = 'var(--primary)';
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

// Mobile buttons
galleryBtn.addEventListener('click', () => fileGallery.click());
cameraBtn.addEventListener('click',  () => fileCamera.click());
fileGallery.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
fileCamera.addEventListener('change',  e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

resetBtn.addEventListener('click', () => {
    selectedImage = null; currentResult = null;
    previewWrap.classList.remove('active');
    previewImage.src = '';
    buttonGroup.classList.remove('active');
    fileGallery.value = ''; fileCamera.value = '';
    resultsEl.classList.remove('active'); resultsEl.innerHTML = '';
    clearError();
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ─────────────────────────────────────────────
//  2️⃣  ANALYSE — call Cloudflare Worker
// ─────────────────────────────────────────────
analyzeBtn.addEventListener('click', async () => {
    if (!selectedImage) return;
    analyzeBtn.disabled = true;
    analyzeBtn.innerHTML = '<span class="spinner"></span>Analyseren…';
    clearError();

    try {
        const base64 = selectedImage.split(',')[1];

        const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64, mediaType: 'image/jpeg' }),
        });

        if (res.status === 429) throw new Error('Te veel aanvragen. Wacht even en probeer opnieuw.');
        if (!res.ok) throw new Error('API-fout: ' + res.status);

        const data = await res.json();
        if (data.error) throw new Error(data.error);

        currentResult = data.result;
        displayResults(currentResult);
        saveToHistory(currentResult, selectedImage);

        resultsEl.classList.add('active');
        resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (err) {
        console.error(err);
        showError(err.message || 'Fout bij analyse. Probeer een duidelijkere foto.');
    } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.innerHTML = '🔍 Analyseren';
    }
});

// ─────────────────────────────────────────────
//  Display results
// ─────────────────────────────────────────────
function confidencePct(str) {
    const m = String(str).match(/(\d+)/);
    return m ? parseInt(m[1]) : 75;
}

function typeBadgeClass(type) {
    if (!type) return 'badge-tuinplant';
    const t = type.toLowerCase();
    if (t.includes('onkruid'))    return 'badge-onkruid';
    if (t.includes('kamer'))      return 'badge-kamer';
    if (t.includes('moes'))       return 'badge-moes';
    return 'badge-tuinplant';
}

function displayResults(r) {
    const pct = confidencePct(r.identificatie.zekerheid);
    const isGiftig = r.giftig && r.giftig.is_giftig;
    const isOnkruid = r.diagnose && r.diagnose.eigenschap_onkruid;

    let html = '';

    // ── Card 1: Identificatie
    html += `
    <div class="result-card">
        <h2>🌿 Identificatie</h2>
        <div class="result-item">
            <span class="result-label">Naam</span>
            <span class="result-value">${esc(r.identificatie.naam_nederlands)} <em>(${esc(r.identificatie.wetenschappelijke_naam)})</em></span>
        </div>
        <div class="result-item">
            <span class="result-label">Type</span>
            <span class="result-value">${esc(r.identificatie.type)}</span>
        </div>
        <div class="result-item" style="border-bottom:none">
            <span class="result-label">Zekerheid</span>
            <div class="confidence-wrap">
                <div class="confidence-bar-bg">
                    <div class="confidence-bar-fill" id="confBar" style="width:0%"></div>
                </div>
                <p class="confidence-pct">${pct}% zeker</p>
            </div>
        </div>
    </div>`;

    // ── Card 2: Giftig waarschuwing (alleen als giftig)
    if (isGiftig) {
        const ernst = (r.giftig.ernst || '').toLowerCase();
        const pillClass = ernst === 'ernstig' ? 'pill-danger' : 'pill-warn';
        html += `
        <div class="result-card">
            <h2 style="color:var(--danger)">☠️ Giftig</h2>
            <div class="giftig-banner">
                <span class="skull">💀</span>
                <div>
                    <h4>Let op — deze plant is giftig!</h4>
                    <p>${esc(r.giftig.beschrijving || '')}</p>
                    <div class="giftig-pills">
                        ${r.giftig.ernst ? `<span class="pill ${pillClass}">${esc(r.giftig.ernst)}</span>` : ''}
                        ${r.giftig.voor_wie ? `<span class="pill pill-warn">Voor: ${esc(r.giftig.voor_wie)}</span>` : ''}
                    </div>
                </div>
            </div>
        </div>`;
    }

    // ── Card 3: Diagnose
    html += `<div class="result-card"><h2>📝 Diagnose & Advies</h2>`;

    if (isOnkruid) {
        html += `<div class="weed-banner"><strong>⚠️ Dit is een onkruid!</strong></div>`;
        html += `
            <h3>⚠️ Eigenschap</h3>
            <div class="result-value">${esc(r.diagnose.eigenschap_onkruid)}</div>
            <h3>🛠️ Bestrijding</h3>
            <div class="result-value">${esc(r.diagnose.bestrijding_onkruid)}</div>
            <h3>🛡️ Preventie</h3>
            <div class="result-value">${esc(r.diagnose.preventie_onkruid)}</div>`;
    } else {
        html += `
            <h3>☀️ Zonlicht</h3>
            <div class="result-value">${esc(r.diagnose.zonlicht || '')}</div>
            <h3>💧 Waterbehoefte</h3>
            <div class="result-value">${esc(r.diagnose.waterbehoefte || '')}</div>
            <h3>✂️ Verzorgingstip</h3>
            <div class="result-value">${esc(r.diagnose.verzorgingstip || '')}</div>`;
    }

    html += `</div>`;

    // ── Actions
    html += `
    <div class="result-actions">
        <button class="btn-secondary" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Nieuwe analyse</button>
        <button class="btn-gold" onclick="downloadReport()">⬇️ Download rapport</button>
    </div>`;

    resultsEl.innerHTML = html;

    // Animate confidence bar
    requestAnimationFrame(() => {
        setTimeout(() => {
            const bar = document.getElementById('confBar');
            if (bar) bar.style.width = pct + '%';
        }, 200);
    });
}

function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  Download rapport
// ─────────────────────────────────────────────
function downloadReport() {
    if (!currentResult) return;
    const r = currentResult;
    let txt = '🌿 PLANTSCOPE RAPPORT\n';
    txt += '='.repeat(40) + '\n\n';
    txt += `Naam:      ${r.identificatie.naam_nederlands}\n`;
    txt += `Latijn:    ${r.identificatie.wetenschappelijke_naam}\n`;
    txt += `Type:      ${r.identificatie.type}\n`;
    txt += `Zekerheid: ${r.identificatie.zekerheid}\n\n`;

    if (r.giftig && r.giftig.is_giftig) {
        txt += '⚠️ GIFTIG\n';
        txt += `Ernst: ${r.giftig.ernst}\nVoor: ${r.giftig.voor_wie}\n${r.giftig.beschrijving}\n\n`;
    }

    txt += '📝 DIAGNOSE\n' + '-'.repeat(30) + '\n';
    if (r.diagnose.eigenschap_onkruid) {
        txt += `Eigenschap: ${r.diagnose.eigenschap_onkruid}\n\nBestrijding:\n${r.diagnose.bestrijding_onkruid}\n\nPreventie:\n${r.diagnose.preventie_onkruid}\n`;
    } else {
        txt += `Zonlicht: ${r.diagnose.zonlicht}\nWater:    ${r.diagnose.waterbehoefte}\nTip:      ${r.diagnose.verzorgingstip}\n`;
    }

    const a = document.createElement('a');
    a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(txt);
    a.download = `plantscope-${r.identificatie.naam_nederlands.replace(/\s+/g,'-').toLowerCase()}.txt`;
    a.click();
}

// ─────────────────────────────────────────────
//  3️⃣  HISTORY (localStorage)
// ─────────────────────────────────────────────
function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
    catch { return []; }
}
function saveHistory(h) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}
function saveToHistory(result, thumb) {
    const h = loadHistory();
    h.unshift({
        id: Date.now(),
        naam: result.identificatie.naam_nederlands,
        type: result.identificatie.type,
        zekerheid: result.identificatie.zekerheid,
        date: new Date().toLocaleDateString('nl-NL'),
        thumb: thumb.substring(0, 6000), // slim thumbnail
        result,
    });
    saveHistory(h.slice(0, MAX_HISTORY));
    updateHistoryBadge();
}

function updateHistoryBadge() {
    const h = loadHistory();
    if (h.length > 0) {
        historyCount.style.display = 'inline-flex';
        historyCount.textContent = h.length;
    } else {
        historyCount.style.display = 'none';
    }
}

function renderHistory() {
    const h = loadHistory();
    if (h.length === 0) {
        historyList.innerHTML = '<p class="history-empty">📭 Nog geen analyses bewaard.<br>Analyseer je eerste plant!</p>';
        return;
    }
    historyList.innerHTML = h.map(item => `
        <div class="history-item" data-id="${item.id}" onclick="loadFromHistory(${item.id})">
            <img class="history-thumb" src="${item.thumb}" alt="" onerror="this.style.display='none'">
            <div class="history-info">
                <div class="history-name">${esc(item.naam)}</div>
                <span class="type-badge ${typeBadgeClass(item.type)}">${esc(item.type)}</span>
                <div class="history-date">${esc(item.date)} · ${esc(item.zekerheid)}</div>
            </div>
            <button class="history-del" onclick="deleteHistory(event,${item.id})" title="Verwijder">🗑</button>
        </div>
    `).join('');
}

function typeBadgeClass(type) {
    if (!type) return 'badge-tuinplant';
    const t = type.toLowerCase();
    if (t.includes('onkruid')) return 'badge-onkruid';
    if (t.includes('kamer'))   return 'badge-kamer';
    if (t.includes('moes'))    return 'badge-moes';
    return 'badge-tuinplant';
}

function loadFromHistory(id) {
    const h = loadHistory();
    const item = h.find(x => x.id === id);
    if (!item) return;
    closeHistory();
    currentResult = item.result;
    displayResults(item.result);
    resultsEl.classList.add('active');
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function deleteHistory(e, id) {
    e.stopPropagation();
    const h = loadHistory().filter(x => x.id !== id);
    saveHistory(h);
    renderHistory();
    updateHistoryBadge();
}

// History drawer toggle
function openHistory()  { renderHistory(); historyDrawer.classList.add('open'); historyOverlay.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeHistory() { historyDrawer.classList.remove('open'); historyOverlay.classList.remove('open'); document.body.style.overflow = ''; }

historyBtn.addEventListener('click', openHistory);
historyClose.addEventListener('click', closeHistory);
historyOverlay.addEventListener('click', closeHistory);
clearHistBtn.addEventListener('click', () => {
    if (confirm('Alle geschiedenis verwijderen?')) {
        localStorage.removeItem(HISTORY_KEY);
        renderHistory(); updateHistoryBadge();
    }
});

// Init badge
updateHistoryBadge();
</script>
